# iOS build → TestFlight, mirroring the estate's proven pattern
# (tfl-delay-repay). Dispatch-only: secrets must be configured first —
# IOS_P12_BASE64/PASSWORD, THAW_PROVISION_BASE64/UUID/NAME, IOS_TEAM_ID,
# APP_STORE_CONNECT_KEY_BASE64/KEY_ID/ISSUER_ID.
name: Build & Deploy iOS to TestFlight

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Xcode DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: derived-data-macos26-${{ hashFiles('package.json') }}
          restore-keys: derived-data-macos26-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Install tar
        run: node -e "require('tar')" 2>/dev/null || npm install --no-save --force tar@6

      - name: Patch metro exports
        run: |
          node -e "
            const path = require.resolve('metro/package.json');
            const pkg = JSON.parse(require('fs').readFileSync(path, 'utf8'));
            if (!pkg.exports['./src/lib/*']) {
              pkg.exports['./src/lib/*'] = './src/lib/*.js';
              require('fs').writeFileSync(path, JSON.stringify(pkg));
              console.log('metro exports patched');
            } else {
              console.log('metro exports already patched');
            }
          "

      - name: Create getUserState shim
        run: |
          node -e "
            const path = require('path');
            const fs = require('fs');
            const { execSync } = require('child_process');
            const code = [
              '\"use strict\";',
              'Object.defineProperty(exports, \"__esModule\", { value: true });',
              'const os = require(\"os\");',
              'const p = require(\"path\");',
              'const expoDir = p.join(os.homedir(), \".expo\");',
              'const stateFile = p.join(expoDir, \"state.json\");',
              'exports.getExpoHomeDirectory = function() { return expoDir; };',
              'exports.getUserStatePath = function() { return stateFile; };',
              'exports.getAsync = function() { return Promise.resolve({}); };',
              'exports.setAsync = function() { return Promise.resolve(); };',
              'exports.getUserState = function(filename) {',
              '  const f = filename ? p.join(expoDir, filename) : stateFile;',
              '  return {',
              '    getUserStatePath: function() { return f; },',
              '    getExpoHomeDirectory: function() { return expoDir; },',
              '    getAsync: function() { return Promise.resolve({}); },',
              '    setAsync: function() { return Promise.resolve(); }',
              '  };',
              '};'
            ].join(\"\n\");
            let locs;
            try {
              const out = execSync('find node_modules -name package.json -path */@expo/config/package.json 2>/dev/null', {encoding:\"utf8\"}).trim();
              locs = out.split(\"\n\").filter(Boolean).map(p2 => path.join(path.dirname(p2), 'build', 'getUserState.js'));
            } catch(e) {
              locs = ['node_modules/@expo/config/build/getUserState.js'];
            }
            for (const loc of locs) {
              fs.mkdirSync(path.dirname(loc), { recursive: true });
              fs.writeFileSync(loc, code);
              console.log('Shim written:', loc);
            }
          "

      - name: Create @expo/env shim
        run: |
          node -e "
            const path = require('path');
            const fs = require('fs');
            const { execSync } = require('child_process');
            const code = [
              '\"use strict\";',
              'Object.defineProperty(exports, \"__esModule\", { value: true });',
              'exports.createControlledEnvironment = createControlledEnvironment;',
              'exports.getFiles = getFiles;',
              'exports.isEnabled = isEnabled;',
              'function isEnabled() { return false; }',
              'function getFiles() { return []; }',
              'function createControlledEnvironment() {',
              '  function load() { return process.env; }',
              '  function get() { return { env: {}, files: [] }; }',
              '  function _getForce() { return { env: {}, files: [] }; }',
              '  return { load, get, _getForce };',
              '}'
            ].join(\"\n\");
            let locs;
            try {
              const out = execSync('find node_modules -name package.json -path */@expo/env/package.json 2>/dev/null', {encoding:\"utf8\"}).trim();
              locs = out.split(\"\n\").filter(Boolean).map(p2 => path.join(path.dirname(p2), 'build', 'env.js'));
            } catch(e) {
              locs = ['node_modules/@expo/env/build/env.js'];
            }
            for (const loc of locs) {
              fs.mkdirSync(path.dirname(loc), { recursive: true });
              if (!fs.existsSync(loc)) {
                fs.writeFileSync(loc, code);
                console.log('env.js shim written:', loc);
              }
            }
          "

      - name: Prebuild iOS native project
        env:
          EXPO_NO_TELEMETRY: '1'
        run: CI=1 npx expo prebuild --platform ios --clean --no-install

      - name: Verify export-compliance flag in Info.plist
        run: |
          PLIST=$(find ios -name Info.plist -path "*/Thaw/*" | head -1)
          /usr/libexec/PlistBuddy -c "Print :ITSAppUsesNonExemptEncryption" "$PLIST" | grep -q true \
            || { echo "ITSAppUsesNonExemptEncryption must be YES (docs/export-compliance.md)"; exit 1; }

      - name: Install CocoaPods
        run: cd ios && pod install --repo-update

      - name: Import certificate
        run: |
          echo "${{ secrets.IOS_P12_BASE64 }}" | base64 --decode > dist.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import dist.p12 \
            -k build.keychain \
            -P "${{ secrets.IOS_P12_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm dist.p12

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.THAW_PROVISION_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/${{ secrets.THAW_PROVISION_UUID }}.mobileprovision

      - name: Decode App Store Connect key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

      - name: Build iOS archive
        run: |
          XCWORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" -type d | head -1)
          SCHEME=$(basename "$XCWORKSPACE" .xcworkspace)
          xcodebuild archive \
            -workspace "$XCWORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/Thaw.xcarchive \
            -parallelizeTargets \
            -jobs 4 \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE="${{ secrets.THAW_PROVISION_UUID }}" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.THAW_PROVISION_NAME }}" \
            DEVELOPMENT_TEAM="${{ secrets.IOS_TEAM_ID }}" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            -allowProvisioningUpdates

      - name: Export IPA
        run: |
          node -e "
            const fs = require('fs');
            const xml = [
              '<?xml version=\"1.0\" encoding=\"UTF-8\"?>',
              '<!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">',
              '<plist version=\"1.0\"><dict>',
              '  <key>method</key><string>app-store-connect</string>',
              '  <key>teamID</key><string>V628699P6F</string>',
              '  <key>signingStyle</key><string>manual</string>',
              '  <key>signingCertificate</key><string>iPhone Distribution</string>',
              '  <key>provisioningProfiles</key><dict>',
              '    <key>com.nanoluke.thaw</key><string>${{ secrets.THAW_PROVISION_UUID }}</string>',
              '  </dict>',
              '  <key>uploadSymbols</key><true/>',
              '  <key>compileBitcode</key><false/>',
              '</dict></plist>'
            ].join(\"\n\");
            fs.writeFileSync('/tmp/ExportOptions.plist', xml);
          "
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Thaw.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8 \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" \
            -allowProvisioningUpdates

      - name: Upload to TestFlight
        run: |
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$(ls $RUNNER_TEMP/export/*.ipa | head -1)" \
            --apiKey "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: thaw-ios
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 30
